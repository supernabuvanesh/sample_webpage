<!DOCTYPE html>
<html>

<head>
    <title>Registration form</title>
</head>

<body>
    <h1>Registration Form</h1>
    <form>
        <div>
            <label for=student-name>Student name</label>
            <input type="text" name="student name" id="student name" placeholder="Enter your name">
        </div>

        <div>
            <label for=candiatae-password>Candiatae-password</label>
            <input type="password" name="candiatae-password" id="candiatae-password" placeholder="Enter your password">
        </div>

        <div>
            <label for="tel">telephone</label>
            <input type="tel" name="tel" id="tel" pattern="[5-9]{10}" minlength="5" maxlength="10" />
        </div>
        <div>
            <label for="dob">DOB</label>
            <input type="date" name="sample text" id="value"  min="2026-04-04"    max="2026-04-18">

        </div>
        <div>
            <input type="submit" value="register">

        </div>
    </form>

</body>

</html>
